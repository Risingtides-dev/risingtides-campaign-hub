name: Sync from upstream (jakebalik-bit)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream to fork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add Jake's repo as upstream
          git remote add upstream https://github.com/jakebalik-bit/risingtides-campaign-hub.git
          git fetch upstream main

          UPSTREAM_SHA=$(git rev-parse upstream/main)
          FORK_SHA=$(git rev-parse HEAD)

          # If upstream is already an ancestor of our fork, we're ahead — nothing to do
          if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD; then
            echo "Fork is ahead of or equal to upstream. Nothing to sync."
            exit 0
          fi

          # If our fork is an ancestor of upstream, upstream is strictly ahead — fast-forward safe
          if git merge-base --is-ancestor HEAD "$UPSTREAM_SHA"; then
            echo "Upstream is strictly ahead. Fast-forward merging..."
            git merge --ff-only upstream/main
            git push origin main
            exit 0
          fi

          # Branches have diverged — merge upstream into our fork (fork wins on conflicts)
          echo "Branches have diverged. Merging upstream into fork (fork takes precedence)..."
          git merge upstream/main --no-edit -m "chore: merge upstream changes" -X ours
          git push origin main
