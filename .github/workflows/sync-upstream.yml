name: Sync from upstream (jakebalik-bit)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream to fork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add Jake's repo as upstream
          git remote add upstream https://github.com/jakebalik-bit/risingtides-campaign-hub.git
          git fetch upstream main

          # Check if upstream has new commits
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD; then
            echo "Already up to date. Skipping."
            exit 0
          fi

          echo "New upstream changes detected. Syncing..."

          # Save our workflow file before overwriting
          cp -r .github /tmp/.github-backup

          # Reset to upstream's main
          git reset --hard upstream/main

          # Restore our workflow file
          mkdir -p .github
          cp -r /tmp/.github-backup/.github/workflows .github/

          # Commit the workflow file
          git add .github/
          git diff --cached --quiet || git commit -m "chore: preserve sync workflow"

          # Push to our fork
          git push origin main --force
